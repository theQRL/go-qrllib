name: Test

on: [push, pull_request]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.25.x']

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Go ${{ matrix.go-version }}
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: ${{ matrix.go-version }}

      - name: Display Go version
        run: go version

      - name: Verify dependencies
        run: go mod verify

      - name: Install dependencies
        run: go get -v ./...

      - name: Build
        run: go build -v ./...

      - name: Test
        # Note: SPHINCS+ wallet tests are slow and can take several minutes.
        run: |
          # shellcheck disable=SC2046
          go clean -testcache && go test -v ./... -coverprofile=coverage.out -covermode=atomic | sed "s/PASS/$(printf '\033[32mPASS\033[0m')/g" | sed "s/FAIL/$(printf '\033[31mFAIL\033[0m')/g"

      - name: Process coverage exclusions
        run: |
          go install github.com/hexira/go-ignore-cov@latest
          go-ignore-cov --file coverage.out

      - name: Test with race detector
        timeout-minutes: 60
        # Use -short to skip slow SPHINCS+ tests that don't provide additional race coverage
        run: go test -race -short -v ./...

      - name: Run fuzz tests
        run: |
          # Run each fuzz test for 10 seconds
          for pkg in ./crypto/dilithium ./crypto/xmss ./crypto/sphincsplus_256s ./crypto/ml_dsa_87 ./crypto/internal/mlkem1024 ./wallet/misc; do
            echo "Fuzzing $pkg..."
            for fuzz in $(go test "$pkg" -list 'Fuzz.*' 2>/dev/null | grep '^Fuzz'); do
              echo "  Running $fuzz..."
              go test "$pkg" -fuzz="^${fuzz}\$" -fuzztime=10s -v 2>&1 | tail -5
            done
          done

      - name: Run metamorphic invariant sweep
        # Build-tagged exhaustive bit-by-bit metamorphic tests
        # contributed by Trail of Bits during the audit engagement.
        # Runs in ~30s; guarded behind `-tags metamorphic` so it doesn't
        # slow down day-to-day `go test ./...`.
        timeout-minutes: 5
        run: go test -tags metamorphic -count=1 -run "TestMetamorphic" -timeout 5m ./crypto/ml_dsa_87/

      - name: Upload coverage to Codecov
        if: github.repository == 'theQRL/go-qrllib' && github.event_name == 'push'
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: go-qrllib
          fail_ci_if_error: true

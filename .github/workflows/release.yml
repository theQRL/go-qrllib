name: Release

on:
  workflow_run:
    workflows: [Test, Lint, Security]
    types: [completed]
    branches: [main]

# Top-level permissions are deliberately empty — every job below sets the
# minimum-required scope explicitly. This keeps the GITHUB_TOKEN granted
# to ad-hoc `run:` steps read-only by default and forces any future
# permission grant to be a deliberate addition to a specific job rather
# than an inherited blanket.
permissions: {}

# Don't cancel an in-flight release if a new one is queued — releases
# need to run to completion or downstream attestations and SBOM uploads
# get into a partial state.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    # Only run if all triggering workflows succeeded, on the main repo, and triggered by push
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.repository == 'theQRL/go-qrllib'
    permissions:
      contents: write       # tag the release commit and push the tag
      issues: write         # post the auto-generated release-notes comment on closed issues
      pull-requests: write  # post the same comment on the merged PRs
    outputs:
      new_release_published: ${{ steps.semantic.outputs.version }}
      new_release_version: ${{ steps.semantic.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Semantic Release
        id: semantic
        uses: go-semantic-release/action@2e9dc4247a6004f8377781bef4cb9dad273a741f # v1.24.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          allow-initial-development-versions: true
          changelog-generator-opt: "emojis=true"

  # Generate checksums, SBOM, and attestations for the release
  supply-chain-security:
    name: Supply Chain Security Artifacts
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published != ''
    permissions:
      contents: write      # upload signed artefacts to the GitHub release
      id-token: write      # mint Sigstore OIDC tokens for keyless signing of attestations
      attestations: write  # write SLSA / SBOM attestations to the repo's attestation store
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: '1.25'

      - name: Get release version
        id: version
        # Pass the upstream output through an env var rather than expanding
        # `${{ ... }}` directly inside the shell command — the env-var path
        # neutralises any shell metacharacters semantic-release might emit
        # in a future version (zizmor template-injection).
        env:
          NEW_RELEASE_VERSION: ${{ needs.release.outputs.new_release_version }}
        run: echo "version=${NEW_RELEASE_VERSION}" >> "$GITHUB_OUTPUT"

      # Generate checksums for source files
      - name: Generate checksums
        run: |
          mkdir -p dist
          sha256sum go.mod go.sum > dist/checksums-sha256.txt
          sha512sum go.mod go.sum > dist/checksums-sha512.txt
          # Also create a checksums file for the entire source
          find . -name "*.go" -type f | sort | xargs sha256sum >> dist/source-checksums-sha256.txt

      # Generate SBOM using Syft
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: spdx-json
          output-file: dist/sbom-spdx.json
          artifact-name: sbom-spdx.json

      - name: Generate SBOM (CycloneDX)
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          format: cyclonedx-json
          output-file: dist/sbom-cyclonedx.json
          artifact-name: sbom-cyclonedx.json

      # Attest checksums with GitHub attestations (Sigstore-backed)
      - name: Attest checksums
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/checksums-sha256.txt
            dist/checksums-sha512.txt

      # Attest SBOM files
      - name: Attest SBOM (SPDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/sbom-spdx.json
          sbom-path: dist/sbom-spdx.json

      - name: Attest SBOM (CycloneDX)
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/sbom-cyclonedx.json
          sbom-path: dist/sbom-cyclonedx.json

      # Attest go.mod and go.sum directly
      - name: Attest module files
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            go.mod
            go.sum

      # Upload artifacts to the release
      - name: Upload release artifacts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Pass the version through env rather than `${{ ... }}` inside
          # the shell command — neutralises any shell metacharacters that
          # the upstream version string might contain (zizmor template-injection).
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release upload "v${RELEASE_VERSION}" \
            dist/checksums-sha256.txt \
            dist/checksums-sha512.txt \
            dist/sbom-spdx.json \
            dist/sbom-cyclonedx.json \
            --clobber

  # Compute subjects for SLSA provenance
  compute-subjects:
    name: Compute SLSA Subjects
    runs-on: ubuntu-latest
    needs: release
    if: needs.release.outputs.new_release_published != ''
    permissions:
      contents: read  # only need to read go.mod/go.sum to hash them
    outputs:
      hashes: ${{ steps.hash.outputs.hashes }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Generate subject hashes
        id: hash
        run: |
          # Compute SHA256 hashes of go.mod and go.sum
          set -euo pipefail
          echo "hashes=$(sha256sum go.mod go.sum | base64 -w0)" >> "$GITHUB_OUTPUT"

  # Generate SLSA provenance (Level 3)
  provenance:
    name: SLSA Provenance
    needs: [release, compute-subjects]
    if: needs.release.outputs.new_release_published != ''
    permissions:
      actions: read    # the slsa-generator reads run metadata to produce the provenance
      id-token: write  # mint Sigstore OIDC tokens for keyless signing of provenance
      contents: write  # upload provenance.intoto.jsonl as a release asset
    # SLSA reusable workflows MUST be tag-pinned (not SHA-pinned) so the
    # slsa-verifier can validate the generator's identity against the
    # signed release. SHA-pinning here would break SLSA Level 3 provenance
    # verification. The zizmor unpinned-uses audit is configured to allow
    # ref-pinning for slsa-framework specifically — see .github/zizmor.yml.
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.compute-subjects.outputs.hashes }}
      upload-assets: true
      provenance-name: provenance.intoto.jsonl
